<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AutoPayPlus — Confirm Details</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://kit.fontawesome.com/88e6030591.js" crossorigin="anonymous"></script>
</head>
<body>
<main class="app">

    <!-- Logo -->
    <div style="text-align:center;padding-top:8px;padding-bottom:18px;">
      <img src="https://autopayplus.com/wp-content/uploads/2021/05/APP-Logo-2024-without-USEA.svg" alt="AutoPayPlus" style="height:28px;">
    </div>

    <div class="step-bar">
      <div class="step-meta"><span>Step 3 of 7</span><span class="label">Contact Info</span></div>
      <div class="step-track"><div class="step-fill" style="width:40%"></div></div>
    </div>

    <h1>Confirm your details</h1>
    <p class="subtitle">You'll always be able to see and update this later. We use it to keep you posted on your plan.</p>

    <div style="display:flex;gap:10px;">
      <div class="input-group" style="flex:1;"><label>First Name</label><input type="text" value="Sarah"></div>
      <div class="input-group" style="flex:1;"><label>Last Name</label><input type="text" value="Whitman"></div>
    </div>

    <div class="input-group"><label>Email</label><input type="email" value="sarahthompson@gmail.com"></div>
    <div class="input-group"><label>Cell Phone</label><input type="tel" value="(555) 123-4567"></div>
    <div class="input-group"><label>Home Phone (optional)</label><input type="tel" placeholder="(555) 000-0000"></div>
    <div class="input-group"><label>Address</label><input type="text" value="800 Magnolia Ave 12th Floor"></div>

    <div style="display:flex;gap:10px;">
      <div class="input-group" style="flex:1;"><label>City</label><input type="text" value="Orlando"></div>
      <div class="input-group" style="width:70px;"><label>State</label><input type="text" value="FL" maxlength="2" style="text-transform:uppercase;"></div>
      <div class="input-group" style="flex:1;"><label>ZIP</label><input type="text" value="32803" maxlength="5" inputmode="numeric"></div>
    </div>

    <div class="alert alert-info mt-2">
      <i class="fa-solid fa-phone alert-icon" style="color:#0576CE;font-size:18px;"></i>
      <div class="alert-body">We'll use this for account alerts and important updates — nothing else.</div>
    </div>

    <a href="06-create-login.html" class="btn btn-primary">Looks Good</a>
    <a href="04-enter-mfa.html" class="btn btn-ghost">Back</a>
    <div class="page-footer">
      <a href="get-help.html" class="help-link">Having trouble? Get help</a>
      <div class="security-footer">
        <i class="fa-solid fa-lock" style="font-size:11px;color:#8A8A8A;"></i>
        <span>Secure and encrypted</span>
      </div>
    </div>
</main>
</body>
</html>
