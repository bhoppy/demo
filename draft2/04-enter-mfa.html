<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AutoPayPlus — Enter MFA Code</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="phone-frame">
  <!-- Page Header -->
  <div class="page-header">
    <a href="/draft2/03-choose-mfa.html" class="back-link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Back</a>
    <img src="/logo.webp" alt="AutoPayPlus">
  </div>
  <div class="screen">

    <div class="step-bar" style="margin-top:20px;">
      <span class="step-label">Verify Code</span>
      <div class="step-track"><div class="step-fill" style="width:30%"></div></div>
    </div>

    <div class="icon-circle primary">💬</div>
    <h1>Enter your code</h1>
    <p class="subtitle">We sent a 6-digit code to ••••1234</p>

    <!-- OTP Inputs -->
    <div class="otp-group mb-4">
      <input type="text" maxlength="1" inputmode="numeric" oninput="otpAdvance(this,0)" onfocus="this.select()">
      <input type="text" maxlength="1" inputmode="numeric" oninput="otpAdvance(this,1)" onfocus="this.select()">
      <input type="text" maxlength="1" inputmode="numeric" oninput="otpAdvance(this,2)" onfocus="this.select()">
      <input type="text" maxlength="1" inputmode="numeric" oninput="otpAdvance(this,3)" onfocus="this.select()">
      <input type="text" maxlength="1" inputmode="numeric" oninput="otpAdvance(this,4)" onfocus="this.select()">
      <input type="text" maxlength="1" inputmode="numeric" oninput="otpAdvance(this,5)" onfocus="this.select()">
    </div>

    <p class="text-xs text-muted text-center mb-2">Code expires in 10 minutes</p>
    <p class="text-sm text-accent text-center mb-6" style="cursor:pointer;" id="resend-link" onclick="resendCode()">Resend code</p>

    <div class="spacer"></div>

    <a href="/draft2/05-confirm-contact.html" class="btn btn-primary mb-3">Verify</a>
    <a href="/draft2/03-choose-mfa.html" class="btn btn-ghost">Use a different method</a>

    <div class="security-footer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>Secure and encrypted</span>
    </div>
  </div>
</div>

<script>
const otpInputs = document.querySelectorAll('.otp-group input');
function otpAdvance(el, idx) {
  if(el.value && idx < 5) otpInputs[idx+1].focus();
  el.classList.toggle('filled', !!el.value);
}
otpInputs.forEach((inp, i) => {
  inp.addEventListener('keydown', e => {
    if(e.key === 'Backspace' && !inp.value && i > 0) otpInputs[i-1].focus();
  });
  // Support paste
  inp.addEventListener('paste', e => {
    e.preventDefault();
    const data = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
    data.split('').forEach((c,j) => { if(otpInputs[j]) { otpInputs[j].value = c; otpInputs[j].classList.add('filled'); }});
    if(data.length > 0) otpInputs[Math.min(data.length, 5)].focus();
  });
});

let cooldown = 0;
function resendCode() {
  if(cooldown > 0) return;
  cooldown = 30;
  otpInputs.forEach(i => { i.value=''; i.classList.remove('filled'); });
  otpInputs[0].focus();
  const link = document.getElementById('resend-link');
  const tick = setInterval(() => {
    cooldown--;
    link.textContent = cooldown > 0 ? `You can request a new code in ${cooldown}s` : 'Resend code';
    link.style.color = cooldown > 0 ? 'var(--muted)' : 'var(--accent)';
    if(cooldown <= 0) clearInterval(tick);
  }, 1000);
}
</script>
</body>
</html>
