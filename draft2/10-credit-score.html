<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AutoPayPlus — Credit Score</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
<div class="phone-frame">
  <!-- Page Header -->
  <div class="page-header">
    <a href="/draft2/08-transunion-method.html" class="back-link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Back</a>
    <img src="/logo.webp" alt="AutoPayPlus">
  </div>
  <div class="screen">

    <div class="step-bar" style="margin-top:20px;">
      <span class="step-label">Credit Score</span>
      <div class="step-track"><div class="step-fill" style="width:88%"></div></div>
    </div>

    <!-- Success Badge -->
    <div style="text-align:center;margin-bottom:24px;">
      <div style="width:64px;height:64px;border-radius:50%;background:rgba(22,163,74,0.1);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <h1>Your credit monitoring is active</h1>
      <p class="subtitle" style="margin-bottom:0;">You now have 12 months of TransUnion credit monitoring included with your membership.</p>
    </div>

    <!-- Score Card -->
    <div class="card mb-6" style="text-align:center;padding:32px 16px;">
      <p class="text-sm text-subtext mb-2">Your Credit Score</p>
      <div style="font-size:64px;font-weight:700;color:#22C55E;line-height:1;">742</div>
      <div style="display:inline-block;background:rgba(34,197,94,0.12);padding:4px 16px;border-radius:99px;margin-top:8px;">
        <span style="font-size:14px;font-weight:600;color:#22C55E;">Good</span>
      </div>
      <p class="text-xs text-muted mt-3">Last updated: April 9, 2026</p>
    </div>

    <!-- Benefits -->
    <div class="mb-6">
      <div style="display:flex;align-items:center;margin-bottom:12px;">
        <div style="width:32px;height:32px;background:rgba(37,99,235,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-right:12px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </div>
        <span class="text-sm">Monitor changes to your credit</span>
      </div>
      <div style="display:flex;align-items:center;">
        <div style="width:32px;height:32px;background:rgba(37,99,235,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-right:12px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <span class="text-sm">Stay informed of key updates</span>
      </div>
    </div>

    <div class="spacer"></div>

    <a href="/draft2/11-setup-summary.html" class="btn btn-primary mb-3">Continue</a>
    <button class="btn btn-ghost">Learn More</button>

    <div class="security-footer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>Secure and encrypted</span>
    </div>
  </div>
</div>
</body>
</html>
