<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AutoPayPlus — Confirm It's You</title>
  <link rel="stylesheet" href="shared.css">
  <script src="https://kit.fontawesome.com/88e6030591.js" crossorigin="anonymous"></script>
</head>
<body>
<main class="app">

    <!-- Logo -->
    <div style="text-align:center;padding-top:8px;padding-bottom:18px;">
      <img src="https://autopayplus.com/wp-content/uploads/2021/05/APP-Logo-2024-without-USEA.svg" alt="AutoPayPlus" style="height:28px;">
    </div>

    <div class="step-bar">
      <div class="step-meta"><span>Step 1 of 7</span><span class="label">Identity</span></div>
      <div class="step-track"><div class="step-fill" style="width:10%"></div></div>
    </div>

    <h1>Let's confirm it's you</h1>
    <p class="subtitle">We'll show you each step. First, we need two pieces of information to match you to your account.</p>

    <div class="input-group">
      <label>Email Address</label>
      <input type="text" placeholder="example@gmail.com">
    </div>

    <div class="input-group">
      <label>Last 4 digits of SSN</label>
      <div class="input-wrapper">
        <input type="password" placeholder="••••" maxlength="4" inputmode="numeric">
        <button class="toggle-pw" onclick="togglePW(this)">👁</button>
      </div>
    </div>

    <div class="alert alert-info">
      <i class="fa-solid fa-shield-check alert-icon" style="color:#0576CE;font-size:18px;"></i>
      <div class="alert-body">Your information is encrypted and used only to verify your identity. We don't share it.</div>
    </div>

    <div class="spacer"></div>

    <a href="03-choose-mfa.html" class="btn btn-primary">Continue</a>
    <a href="01-magic-link.html" class="btn btn-ghost">Back</a>
    <div class="page-footer">
      <a href="get-help.html" class="help-link">Having trouble? Get help</a>
      <div class="security-footer">
        <i class="fa-solid fa-lock" style="font-size:11px;color:#8A8A8A;"></i>
        <span>Secure and encrypted</span>
      </div>
    </div>
  </div>
</div>
