<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AutoPayPlus — Phone Verification</title>
  <link rel="stylesheet" href="../draft2/shared.css">
</head>
<body>
<div class="phone-frame">
  <!-- Page Header -->
  <div class="page-header">
    <a href="02-identity-check.html" class="back-link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Back</a>
    <img src="/logo.webp" alt="AutoPayPlus">
  </div>
  <div class="screen">

    <!-- Logo -->
    <div style="text-align:center;padding-top:12px;padding-bottom:8px;">
      <img src="/logo.webp" alt="AutoPayPlus" style="height:32px;margin-bottom:12px;">
    </div>

    <!-- Badge -->
    <div style="text-align:center;margin-bottom:16px;">
      <span class="badge badge-success" style="padding:4px 14px;font-weight:600;">CUSTOMER</span>
    </div>

    <!-- Step Bar -->
    <div class="step-bar" style="margin-top:20px;">
      <span class="step-label">Phone Verify</span>
      <div class="step-track"><div class="step-fill" style="width:42%"></div></div>
    </div>

    <!-- Icon & Header -->
    <div class="icon-circle primary">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
    </div>
    <h1>Verify Your Phone</h1>
    <p class="subtitle">A 6-digit code was sent to the customer's mobile number.</p>

    <!-- Warning Card -->
    <div style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius);background:var(--warning-bg);margin-bottom:20px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--warning);margin-bottom:2px;">Important</div>
        <div style="font-size:12px;color:var(--subtext);">The customer must enter this code themselves. Do not read the code aloud.</div>
      </div>
    </div>

    <!-- Sent to -->
    <p class="text-sm text-subtext text-center mb-4">Code sent to <strong>(404) 555-&#8226;&#8226;&#8226;&#8226;</strong></p>

    <!-- OTP Inputs -->
    <div class="otp-group mb-4">
      <input type="text" maxlength="1" inputmode="numeric" value="4" class="filled" oninput="otpAdvance(this,0)" onfocus="this.select()">
      <input type="text" maxlength="1" inputmode="numeric" value="8" class="filled" oninput="otpAdvance(this,1)" onfocus="this.select()">
      <input type="text" maxlength="1" inputmode="numeric" value="2" class="filled" oninput="otpAdvance(this,2)" onfocus="this.select()">
      <input type="text" maxlength="1" inputmode="numeric" value="9" class="filled" oninput="otpAdvance(this,3)" onfocus="this.select()">
      <input type="text" maxlength="1" inputmode="numeric" value="5" class="filled" oninput="otpAdvance(this,4)" onfocus="this.select()">
      <input type="text" maxlength="1" inputmode="numeric" value="1" class="filled" oninput="otpAdvance(this,5)" onfocus="this.select()">
    </div>

    <p class="text-xs text-muted text-center mb-4">Expires in <strong>4:38</strong></p>

    <div class="spacer"></div>

    <!-- CTAs -->
    <a href="04-attestation.html" class="btn btn-primary mb-3">Verify</a>
    <button class="btn btn-ghost mb-3" onclick="resendCode()">Resend Code</button>

    <div class="security-footer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>Secure and encrypted</span>
    </div>
  </div>
</div>

<script>
const otpInputs = document.querySelectorAll('.otp-group input');
function otpAdvance(el, idx) {
  if(el.value && idx < 5) otpInputs[idx+1].focus();
  el.classList.toggle('filled', !!el.value);
}
otpInputs.forEach((inp, i) => {
  inp.addEventListener('keydown', e => {
    if(e.key === 'Backspace' && !inp.value && i > 0) otpInputs[i-1].focus();
  });
  inp.addEventListener('paste', e => {
    e.preventDefault();
    const data = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
    data.split('').forEach((c,j) => { if(otpInputs[j]) { otpInputs[j].value = c; otpInputs[j].classList.add('filled'); }});
    if(data.length > 0) otpInputs[Math.min(data.length, 5)].focus();
  });
});

function resendCode() {
  otpInputs.forEach(i => { i.value=''; i.classList.remove('filled'); });
  otpInputs[0].focus();
}
</script>
</body>
</html>
