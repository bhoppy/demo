<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AutoPayPlus — Customer Information</title>
  <link rel="stylesheet" href="../draft2/shared.css">
</head>
<body>
<div class="phone-frame">
  <!-- Page Header -->
  <div class="page-header">
    <a href="/" class="back-link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Back</a>
    <img src="/logo.webp" alt="AutoPayPlus">
  </div>
  <div class="screen">

    <!-- Back to Menu -->
    <div style="padding:12px 0 4px;">
      <a href="/" style="font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Back to Menu
      </a>
    </div>

    <!-- Logo -->
    <div style="text-align:center;padding-top:8px;padding-bottom:8px;">
      <img src="/logo.webp" alt="AutoPayPlus" style="height:32px;margin-bottom:12px;">
    </div>

    <!-- Dealer Agent Badge -->
    <div style="text-align:center;margin-bottom:16px;">
      <span class="badge badge-accent" style="padding:4px 14px;font-weight:600;letter-spacing:0.03em;">DEALER AGENT</span>
    </div>

    <!-- Step Bar -->
    <div class="step-bar" style="margin-top:20px;">
      <span class="step-label">Customer Info</span>
      <div class="step-track"><div class="step-fill" style="width:14%"></div></div>
    </div>

    <!-- Icon & Header -->
    <div class="icon-circle primary">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
    <h1>Customer Information</h1>
    <p class="subtitle">Enter the customer's details to begin identity verification. All fields are required.</p>

    <!-- Form Fields -->
    <div style="display:flex;gap:12px;">
      <div class="input-group" style="flex:1;">
        <label>First Name</label>
        <input type="text" value="Marcus">
      </div>
      <div class="input-group" style="flex:1;">
        <label>Last Name</label>
        <input type="text" value="Thompson">
      </div>
    </div>

    <div style="display:flex;gap:12px;">
      <div class="input-group" style="flex:1;">
        <label>Date of Birth</label>
        <input type="text" value="07/14/1985" placeholder="MM/DD/YYYY">
      </div>
      <div class="input-group" style="flex:1;">
        <label>SSN (last 4)</label>
        <div class="input-wrapper">
          <input type="password" value="7291" maxlength="4" inputmode="numeric">
          <button class="toggle-pw" onclick="togglePW(this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="input-group">
      <label>Physical Address</label>
      <input type="text" value="4821 Westwood Blvd, Atlanta, GA 30311">
    </div>

    <div class="input-group">
      <label>Email Address</label>
      <input type="email" value="marcus.thompson@email.co">
    </div>

    <div class="input-group">
      <label>Mobile Phone</label>
      <input type="tel" value="(404) 555-0192">
    </div>

    <!-- Security Notice -->
    <div style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius);background:var(--success-bg);margin-bottom:24px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--success);margin-bottom:2px;">Data Security</div>
        <div style="font-size:12px;color:var(--subtext);">SSN is encrypted in transit.</div>
      </div>
    </div>

    <div class="spacer"></div>

    <!-- CTAs -->
    <a href="02-identity-check.html" class="btn btn-primary mb-3">Continue</a>

    <!-- Agent / Loan Footer -->
    <p class="text-xs text-muted text-center mt-2" style="margin-bottom:12px;">Agent: J. Rodriguez &middot; Loan #: APP-4901</p>

    <div class="security-footer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>Secure and encrypted</span>
    </div>
  </div>
</div>

<script>
function togglePW(btn) {
  const inp = btn.parentElement.querySelector('input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
