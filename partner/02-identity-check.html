<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>AutoPayPlus — Identity Verification</title>
  <link rel="stylesheet" href="../draft2/shared.css">
</head>
<body>
<div class="phone-frame">
  <!-- Page Header -->
  <div class="page-header">
    <a href="01-customer-info.html" class="back-link"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Back</a>
    <img src="/logo.webp" alt="AutoPayPlus">
  </div>
  <div class="screen">

    <!-- Logo -->
    <div style="text-align:center;padding-top:12px;padding-bottom:8px;">
      <img src="/logo.webp" alt="AutoPayPlus" style="height:32px;margin-bottom:12px;">
    </div>

    <!-- Badge -->
    <div style="text-align:center;margin-bottom:16px;">
      <span class="badge badge-muted" style="padding:4px 14px;font-weight:500;">SYSTEM &middot; No agent input required</span>
    </div>

    <!-- Step Bar -->
    <div class="step-bar" style="margin-top:20px;">
      <span class="step-label">Identity Check</span>
      <div class="step-track"><div class="step-fill" style="width:28%"></div></div>
    </div>

    <!-- Icon & Header -->
    <div class="icon-circle primary">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
    </div>
    <h1>Verifying Identity</h1>
    <p class="subtitle">Running background checks. This typically takes 5-10 seconds.</p>

    <!-- Checklist Card -->
    <div class="card mb-6">

      <!-- Identity Verified -->
      <div class="checklist-item">
        <div class="checklist-icon" style="background:rgba(22,163,74,0.1);color:var(--success);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <span class="text-sm fw-500 flex-1">Identity Verified</span>
        <span class="badge badge-success">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Passed
        </span>
      </div>

      <!-- TransUnion Identity Check -->
      <div class="checklist-item">
        <div class="checklist-icon" style="background:rgba(22,163,74,0.1);color:var(--success);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <span class="text-sm fw-500 flex-1">TransUnion Identity Check</span>
        <span class="badge badge-success">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Passed
        </span>
      </div>

      <!-- Fraud Screening -->
      <div class="checklist-item">
        <div class="checklist-icon" style="background:rgba(22,163,74,0.1);color:var(--success);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
        </div>
        <span class="text-sm fw-500 flex-1">Fraud Screening</span>
        <span class="badge badge-success">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Passed
        </span>
      </div>

      <!-- OFAC Screening -->
      <div class="checklist-item" style="border-bottom:none;">
        <div class="checklist-icon" style="background:rgba(22,163,74,0.1);color:var(--success);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <span class="text-sm fw-500 flex-1">OFAC Screening</span>
        <span class="badge badge-success">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Passed
        </span>
      </div>

    </div>

    <div class="spacer"></div>

    <!-- CTA -->
    <a href="03-phone-otp.html" class="btn btn-primary mb-3">Continue to OTP</a>

    <div class="security-footer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <span>Secure and encrypted</span>
    </div>
  </div>
</div>
</body>
</html>
